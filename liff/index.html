<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>予約情報の入力 | Piano Flex</title>
  <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Hiragino Sans', sans-serif;
      background: #f5f7fa;
      color: #333;
      min-height: 100vh;
    }

    .header {
      background: #3b82f6;
      color: #fff;
      padding: 16px 20px;
      font-size: 18px;
      font-weight: bold;
      text-align: center;
    }

    .form-container {
      max-width: 480px;
      margin: 0 auto;
      padding: 24px 16px 40px;
    }

    .date-badge {
      background: #eff6ff;
      border: 1px solid #bfdbfe;
      border-radius: 8px;
      padding: 10px 14px;
      margin-bottom: 24px;
      font-size: 14px;
      color: #1d4ed8;
    }

    .field {
      margin-bottom: 20px;
    }

    label {
      display: block;
      font-size: 14px;
      font-weight: 600;
      margin-bottom: 6px;
      color: #444;
    }

    .required {
      color: #ef4444;
      margin-left: 4px;
      font-size: 12px;
    }

    input[type="text"],
    input[type="email"],
    textarea {
      width: 100%;
      padding: 12px 14px;
      border: 1.5px solid #d1d5db;
      border-radius: 8px;
      font-size: 15px;
      font-family: inherit;
      background: #fff;
      transition: border-color 0.2s;
      appearance: none;
    }

    input:focus, textarea:focus {
      outline: none;
      border-color: #3b82f6;
      box-shadow: 0 0 0 3px rgba(59,130,246,0.15);
    }

    textarea {
      resize: vertical;
      min-height: 100px;
    }

    .error-msg {
      display: none;
      color: #ef4444;
      font-size: 12px;
      margin-top: 4px;
    }

    .field.has-error input,
    .field.has-error textarea {
      border-color: #ef4444;
    }

    .field.has-error .error-msg {
      display: block;
    }

    .submit-btn {
      width: 100%;
      padding: 16px;
      background: #3b82f6;
      color: #fff;
      font-size: 16px;
      font-weight: bold;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      transition: background 0.2s;
      margin-top: 8px;
    }

    .submit-btn:hover { background: #2563eb; }
    .submit-btn:disabled { background: #93c5fd; cursor: not-allowed; }

    .loading {
      display: none;
      text-align: center;
      padding: 40px 20px;
    }

    .spinner {
      width: 40px;
      height: 40px;
      border: 4px solid #bfdbfe;
      border-top-color: #3b82f6;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 0 auto 16px;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    .success-screen {
      display: none;
      text-align: center;
      padding: 60px 20px;
    }

    .success-icon {
      font-size: 64px;
      margin-bottom: 16px;
    }

    .success-title {
      font-size: 22px;
      font-weight: bold;
      margin-bottom: 8px;
    }

    .success-msg {
      color: #666;
      font-size: 14px;
      line-height: 1.6;
    }
  </style>
</head>
<body>

<div class="header">📝 ご予約情報の入力</div>

<!-- フォーム画面 -->
<div id="formScreen" class="form-container">
  <div id="dateBadge" class="date-badge">
    📅 選択日時：読み込み中...
  </div>

  <form id="bookingForm" novalidate>

    <div class="field" id="fieldName">
      <label for="name">お名前 <span class="required">必須</span></label>
      <input type="text" id="name" name="name" placeholder="山田 花子" autocomplete="name" />
      <div class="error-msg">お名前を入力してください</div>
    </div>

    <div class="field" id="fieldEmail">
      <label for="email">メールアドレス <span class="required">必須</span></label>
      <input type="email" id="email" name="email" placeholder="example@email.com" autocomplete="email" />
      <div class="error-msg">正しいメールアドレスを入力してください</div>
    </div>

    <div class="field" id="fieldConcern">
      <label for="concern">現時点でのお悩み <span class="required">必須</span></label>
      <textarea id="concern" name="concern" placeholder="例：速いパッセージが弾けない、指が動きにくい…など"></textarea>
      <div class="error-msg">お悩みを入力してください</div>
    </div>

    <div class="field" id="fieldFocus">
      <label for="focus">レッスンで特に見てほしいこと <span class="required">必須</span></label>
      <textarea id="focus" name="focus" placeholder="例：右手の脱力の仕方、フレージングの作り方…など"></textarea>
      <div class="error-msg">特に見てほしいことを入力してください</div>
    </div>

    <div class="field" id="fieldNote">
      <label for="note">その他・自由記述 <span style="font-size:12px;color:#888;font-weight:normal;">任意</span></label>
      <textarea id="note" name="note" placeholder="ご質問・ご要望があれば何でもどうぞ" style="min-height:80px;"></textarea>
    </div>

    <button type="submit" class="submit-btn" id="submitBtn">
      確認・次のステップへ →
    </button>

  </form>
</div>

<!-- 送信中 -->
<div class="loading" id="loadingScreen">
  <div class="spinner"></div>
  <p>送信中...</p>
</div>

<!-- 完了 -->
<div class="success-screen" id="successScreen">
  <div class="success-icon">✅</div>
  <div class="success-title">送信完了</div>
  <div class="success-msg">
    ご入力ありがとうございます。<br>
    LINEに戻って利用規約のご確認をお願いします。
  </div>
</div>

<script>
  (async () => {
    // LIFF 初期化
    const LIFF_ID = '__LIFF_ID__'; // サーバー側でビルド時に置換
    await liff.init({ liffId: LIFF_ID });

    if (!liff.isInClient()) {
      document.getElementById('formScreen').innerHTML =
        '<p style="text-align:center;padding:40px;color:#888;">LINEアプリ内でご利用ください。</p>';
      return;
    }

    // URLパラメータから選択日時を表示
    const urlParams = new URLSearchParams(window.location.search);
    const dateLabel = urlParams.get('dateLabel');
    if (dateLabel) {
      document.getElementById('dateBadge').textContent = '📅 ' + decodeURIComponent(dateLabel);
    }

    const userId = liff.getContext()?.userId;

    // フォーム送信
    document.getElementById('bookingForm').addEventListener('submit', async (e) => {
      e.preventDefault();

      // バリデーション
      const name = document.getElementById('name').value.trim();
      const email = document.getElementById('email').value.trim();
      const concern = document.getElementById('concern').value.trim();
      const focus = document.getElementById('focus').value.trim();
      const note = document.getElementById('note').value.trim();

      let valid = true;

      if (!name) {
        document.getElementById('fieldName').classList.add('has-error');
        valid = false;
      } else {
        document.getElementById('fieldName').classList.remove('has-error');
      }

      const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
      if (!email || !emailRegex.test(email)) {
        document.getElementById('fieldEmail').classList.add('has-error');
        valid = false;
      } else {
        document.getElementById('fieldEmail').classList.remove('has-error');
      }

      if (!concern) {
        document.getElementById('fieldConcern').classList.add('has-error');
        valid = false;
      } else {
        document.getElementById('fieldConcern').classList.remove('has-error');
      }

      if (!focus) {
        document.getElementById('fieldFocus').classList.add('has-error');
        valid = false;
      } else {
        document.getElementById('fieldFocus').classList.remove('has-error');
      }

      if (!valid) return;

      // 送信
      document.getElementById('submitBtn').disabled = true;
      document.getElementById('formScreen').style.display = 'none';
      document.getElementById('loadingScreen').style.display = 'block';

      try {
        const res = await fetch('/liff-submit', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ userId, name, email, concern, focus, note }),
        });

        if (!res.ok) throw new Error('送信失敗');

        document.getElementById('loadingScreen').style.display = 'none';
        document.getElementById('successScreen').style.display = 'block';

        // 3秒後にLIFFを閉じる
        setTimeout(() => liff.closeWindow(), 3000);

      } catch (err) {
        document.getElementById('loadingScreen').style.display = 'none';
        document.getElementById('formScreen').style.display = 'block';
        document.getElementById('submitBtn').disabled = false;
        alert('送信中にエラーが発生しました。もう一度お試しください。');
        console.error(err);
      }
    });
  })();
</script>
</body>
</html>
